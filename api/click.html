/* ── Browser / Device Parsing ── */
function parseUA() {
    var ua = navigator.userAgent || '';
    var device = 'desktop';
    if (/Mobi|Android|iPhone|iPod/i.test(ua)) device = 'mobile';
    else if (/Tablet|iPad/i.test(ua)) device = 'tablet';

    var browser = 'Other', browserVer = 0;
    var m;
    if ((m = ua.match(/Edg\/(\d+)/i)))            { browser = 'Edge';    browserVer = parseInt(m[1]); }
    else if ((m = ua.match(/OPR\/(\d+)/i)))        { browser = 'Opera';   browserVer = parseInt(m[1]); }
    else if ((m = ua.match(/Firefox\/(\d+)/i)))    { browser = 'Firefox'; browserVer = parseInt(m[1]); }
    else if ((m = ua.match(/Chrome\/(\d+)/i)))     { browser = 'Chrome';  browserVer = parseInt(m[1]); }
    else if ((m = ua.match(/Version\/(\d+).*Safari/i))) { browser = 'Safari'; browserVer = parseInt(m[1]); }

    /* Latest version thresholds (Apr 2026) */
    var latestMap = { Chrome:124, Firefox:126, Edge:124, Safari:17, Opera:109 };
    var isLatest = latestMap[browser] ? browserVer >= (latestMap[browser] - 10) : null;

    var os = 'Other', osVer = '';
    if ((m = ua.match(/Windows NT ([\d.]+)/i)))       { os = 'Windows'; var wv = {'10.0':'10','6.3':'8.1','6.2':'8','6.1':'7'}; osVer = wv[m[1]] || m[1]; }
    else if ((m = ua.match(/Android ([\d.]+)/i)))     { os = 'Android'; osVer = m[1]; }
    else if ((m = ua.match(/iPhone OS ([\d_]+)/i)))   { os = 'iOS'; osVer = m[1].replace(/_/g,'.'); }
    else if ((m = ua.match(/iPad.*OS ([\d_]+)/i)))    { os = 'iPadOS'; osVer = m[1].replace(/_/g,'.'); }
    else if (/Mac OS X/i.test(ua))                    { os = 'macOS'; var mv = ua.match(/Mac OS X ([\d_]+)/i); osVer = mv ? mv[1].replace(/_/g,'.') : ''; }
    else if (/Linux/i.test(ua))                       { os = 'Linux'; }

    return { device:device, browser:browser, browserVer:browserVer, isLatestBrowser:isLatest, os:os, osVer:osVer, userAgent:ua };
}

/* ── Canvas Fingerprint ── */
function canvasFingerprint() {
    try {
        var c = document.createElement('canvas');
        c.width = 280; c.height = 60;
        var ctx = c.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '16px Arial';
        ctx.fillStyle = 'rgba(102,204,0,0.9)';
        ctx.fillRect(0, 0, 100, 30);
        ctx.fillStyle = '#0A6C80';
        ctx.fillText('ClimaNet\u{1F4CA}', 4, 10);
        ctx.fillStyle = 'rgba(200,50,30,0.6)';
        ctx.fillText('\u2603\u2665\u2665', 80, 35);
        ctx.strokeStyle = '#085a6b';
        ctx.beginPath(); ctx.arc(200, 30, 20, 0, Math.PI * 2); ctx.stroke();
        var data = c.toDataURL();
        var h = 0;
        for (var i = 0; i < data.length; i++) { h = Math.imul(31, h) + data.charCodeAt(i) | 0; }
        return Math.abs(h).toString(16);
    } catch(e) { return 'na'; }
}

/* ── WebGL Fingerprint ── */
function webglFingerprint() {
    try {
        var c = document.createElement('canvas');
        var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
        if (!gl) return 'na';
        var dbg = gl.getExtension('WEBGL_debug_renderer_info');
        var vendor   = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR);
        var renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
        return (vendor + '~' + renderer).replace(/\s+/g, ' ').trim();
    } catch(e) { return 'na'; }
}

/* ── Persistent Device ID ── */
function getDeviceId() {
    var key = '_clima_did';
    try {
        var id = localStorage.getItem(key);
        if (!id) {
            id = 'd' + Date.now().toString(36) + Math.random().toString(36).substr(2, 8);
            localStorage.setItem(key, id);
        }
        return id;
    } catch(e) {
        return 'd' + Date.now().toString(36) + Math.random().toString(36).substr(2,6);
    }
}

/* ── Composite Fingerprint Hash ── */
function buildFingerprint(canvas, webgl, ua, tz, lang, screen) {
    var raw = [canvas, webgl, ua, tz, lang, screen].join('|');
    var h = 0;
    for (var i = 0; i < raw.length; i++) { h = Math.imul(31, h) + raw.charCodeAt(i) | 0; }
    return 'fp_' + Math.abs(h).toString(16);
}

/* ── Browser Extra Signals ── */
function getBrowserSignals() {
    var signals = {};
    signals.cookiesEnabled  = navigator.cookieEnabled || false;
    signals.doNotTrack      = navigator.doNotTrack === '1' || window.doNotTrack === '1';
    signals.touchPoints     = navigator.maxTouchPoints || 0;
    signals.hardwareConcurrency = navigator.hardwareConcurrency || 0;
    signals.deviceMemory    = navigator.deviceMemory || 0;
    signals.plugins         = navigator.plugins ? navigator.plugins.length : 0;
    signals.languages       = navigator.languages ? navigator.languages.join(',') : (navigator.language || '');
    signals.colorDepth      = screen ? screen.colorDepth : 0;
    signals.pixelRatio      = window.devicePixelRatio || 1;
    try { signals.sessionStorage = !!window.sessionStorage; } catch(e) { signals.sessionStorage = false; }
    try { signals.localStorage = !!window.localStorage; } catch(e) { signals.localStorage = false; }
    signals.adBlocker = false; /* placeholder — real check needs DOM test */
    return signals;
}

    var avail = (screen.availWidth || 0) + 'x' + (screen.availHeight || 0);
    return { timezone: tz, tzOffset: tzOffset, screenRes: res, screenAvail: avail };
}

/* ── Strict multi-provider country verification ──
   Returns { country, confidence, conflict } based on agreement between 3 providers.
   confidence = number of providers that returned the winning country.
   conflict = true if no single country got 2+ votes. */
function verifyCountryStrict(seedGeo) {
    function timed(p, ms) {
        return new Promise(function(res) {
            var done = false;
            setTimeout(function(){ if (!done) { done = true; res(null); } }, ms);
            p.then(function(v){ if (!done) { done = true; res(v); } }).catch(function(){ if (!done) { done = true; res(null); } });
        });
    }
    function fetchCC(url, key) {
        return fetch(url).then(function(r){ return r.json(); }).then(function(d) {
            if (!d) return null;
            var cc = d[key]; if (!cc && d.country_code) cc = d.country_code; if (!cc && d.countryCode) cc = d.countryCode;
            return cc ? String(cc).toUpperCase() : null;
        }).catch(function(){ return null; });
    }
    var seedCC = (seedGeo && seedGeo.country) ? String(seedGeo.country).toUpperCase() : null;
    var p1 = timed(fetchCC('https://ipapi.co/json/', 'country_code'), 3500);
    var p2 = timed(fetchCC('https://ipwho.is/', 'country_code'), 3500);
    var p3 = timed(fetchCC('https://ipinfo.io/json', 'country'), 3500);
    return Promise.all([p1, p2, p3]).then(function(results) {
        var votes = {};
        if (seedCC) votes[seedCC] = 1; /* seed counts as 1 vote */
        results.forEach(function(cc) { if (cc) votes[cc] = (votes[cc] || 0) + 1; });
        var best = null, bestCount = 0, total = 0;
        Object.keys(votes).forEach(function(cc) { total += votes[cc]; if (votes[cc] > bestCount) { best = cc; bestCount = votes[cc]; } });
        return { country: best, confidence: bestCount, conflict: total >= 2 && bestCount < 2, total: total };
    });
}

function getGeoData() {
    /* Primary: ip-api.com via our proxy (fast, no rate limit issues) */
    var proxyUrl = IPQS_PROXY + '?ipdata=auto_detect';
    /* ip-api.com doesn't support auto-detect via proxy, use ipapi.co first then proxy fallback */
    return tryFetch('https://ipapi.co/json/', parseIpapi)
        .catch(function() {
            /* Fallback to ip-api.com via proxy using ipwho for IP then proxy for full data */
            return tryFetch('https://ipwho.is/', parseIpwho);
        })
        .catch(function() { return tryFetch('https://ipinfo.io/json', parseIpinfo); })
        .catch(function() {
            return fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout ? AbortSignal.timeout(3000) : undefined })
                .then(function(r){ return r.json(); })
                .then(function(d){ return emptyGeo(d.ip); })
                .catch(function(){ return emptyGeo(''); });
        });
}

/* ── Fraud API helpers ── */
function raceTimeout(promise, ms) {
    var t = new Promise(function(res){ setTimeout(function(){ res(null); }, ms); });
    return Promise.race([promise, t]);
}
function safeJson(url) {
    return fetch(url).then(function(r){ return r.json(); }).catch(function(){ return null; });
}

function checkIPQS(ip, key, strictness) {
    if (!ip || !key) return Promise.resolve(null);
    var url = IPQS_PROXY + '?key=' + encodeURIComponent(key) + '&ip=' + encodeURIComponent(ip) + '&strictness=' + (strictness || '1');
    return raceTimeout(safeJson(url).then(function(d) {
        if (!d || d.error || d.success === false) return null;
        return {
            fraudScore:    d.fraud_score    || 0,
            vpn:           d.vpn            || false,
            tor:           d.tor            || false,
            proxy:         d.proxy          || false,
            botStatus:     d.bot_status     || false,
            isCrawler:     d.is_crawler     || false,
            mobileDevice:  d.mobile         || false,
            recentAbuse:   d.recent_abuse   || false,
            abuseVelocity: d.abuse_velocity || '',
            isp:           d.ISP            || '',
            organization:  d.organization   || '',
            connectionType:d.connection_type|| '',
            country:       d.country_code   || '',
            city:          d.city           || '',
            timezone:      d.timezone       || ''
        };
    }), 4000);
}

function checkAbuseIPDB(ip, key) {
    if (!ip || !key) return Promise.resolve(null);
    var url = IPQS_PROXY + '?abusekey=' + encodeURIComponent(key) + '&abuseip=' + encodeURIComponent(ip);
    return raceTimeout(safeJson(url).then(function(d) {
        if (!d || !d.data) return null;
        return {
            abuseScore:   d.data.abuseConfidenceScore || 0,
            totalReports: d.data.totalReports         || 0,
            usageType:    d.data.usageType            || '',
            isTor:        d.data.isTor                || false,

        };
    }), 4000);
}

function checkScamalytics(ip, key, user) {
    if (!ip || !key || !user) return Promise.resolve(null);
    var url = IPQS_PROXY + '?scamuser=' + encodeURIComponent(user) + '&scamkey=' + encodeURIComponent(key) + '&scamip=' + encodeURIComponent(ip);
    return raceTimeout(safeJson(url).then(function(d) {
        if (!d) return null;
        /* v3: response wrapped in d.scamalytics object */
        var s = (d.scamalytics && d.scamalytics.scamalytics_score !== undefined) ? d.scamalytics : d;
        if (s.status === 'error' || s.scamalytics_score === undefined) return null;
        /* VPN/TOR/datacenter are "yes"/"no" strings in v3 */
        function isYes(v) { return v === 'yes' || v === true || v === '1'; }
        return {
            score:    parseInt(s.scamalytics_score, 10) || 0,
            risk:     s.scamalytics_risk || '',          /* none/low/medium/high/very high */
            vpn:      isYes(s.vpn),
            tor:      isYes(s.tor),
            dchost:   isYes(s.datacenter),
            anonProxy:isYes(s.anonymous_proxy),
            pubAP:    isYes(s.public_access_point),
            searchBot:isYes(s.search_engine_bot)
        };
    }), 4000);
}

function checkProxyCheck(ip, key) {
    if (!ip) return Promise.resolve(null);
    var url = IPQS_PROXY + '?pcip=' + encodeURIComponent(ip) + (key ? '&pckey=' + encodeURIComponent(key) : '');
    return raceTimeout(safeJson(url).then(function(d) {
        if (!d || d.status === 'error') return null;
        var info = d[ip] || {};
        return {
            proxy:    info.proxy    || 'no',
            type:     info.type     || '',
            provider: info.provider || '',
            risk:     info.risk     || 0,
            asn:      info.asn      || '',
            isp:      info.provider || ''
        };
    }), 4000);
}

function checkIpHub(ip, key) {
    if (!ip || !key) return Promise.resolve(null);
    var url = IPQS_PROXY + '?iphubkey=' + encodeURIComponent(key) + '&iphubip=' + encodeURIComponent(ip);
    return raceTimeout(safeJson(url).then(function(d) {
        if (!d || d.error) return null;
        return {
            block: d.block !== undefined ? d.block : -1,  /* 0=clean 1=vpn/proxy 2=unknown */
            isp:   d.isp  || '',
            asn:   d.asn  || '',
            city:  d.countryCode || ''
        };
    }), 4000);
}

function checkIpApiCom(ip) {
    if (!ip) return Promise.resolve(null);
    var url = IPQS_PROXY + '?ipdata=' + encodeURIComponent(ip);
    return raceTimeout(safeJson(url).then(function(d) {
        if (!d || d.status === 'fail') return null;
        return {
            country:     d.country     || '',
            countryCode: d.countryCode || '',
            region:      d.regionName  || '',
            city:        d.city        || '',
            isp:         d.isp         || '',
            org:         d.org         || '',

            lat:         d.lat         || 0,
            lon:         d.lon         || 0,
            proxy:       d.proxy       || false,
            hosting:     d.hosting     || false
        };
    }), 4000);
}

/* Run all configured fraud services in parallel, combine results */
function runAllFraudChecks(ip, fraudSettings) {
    if (!ip || ip === 'unknown') return Promise.resolve(null);
    var checks = [
        checkIPQS(ip, fraudSettings.ipqsKey, fraudSettings.strictness),
        checkAbuseIPDB(ip, fraudSettings.abuseKey),
        checkScamalytics(ip, fraudSettings.scamKey, fraudSettings.scamUser),
        checkProxyCheck(ip, fraudSettings.pcKey),
        checkIpHub(ip, fraudSettings.iphubKey),
        checkIpApiCom(ip)
    ];
    return Promise.all(checks).then(function(results) {
        var ipqs      = results[0];
        var abuse     = results[1];
        var scam      = results[2];
        var pc        = results[3];
        var iphub     = results[4];
        var ipapi     = results[5];

        /* Combined fraud score (weighted average of available sources) */
        var scores = [], weights = [];
        if (ipqs)  { scores.push(ipqs.fraudScore);       weights.push(3); }
        if (scam)  { scores.push(scam.score);            weights.push(2); }
        if (abuse) { scores.push(abuse.abuseScore);      weights.push(2); }
        if (pc)    { scores.push(pc.risk || 0);          weights.push(1); }
        if (iphub) { scores.push(iphub.block === 1 ? 80 : iphub.block === 2 ? 40 : 0); weights.push(1); }

        var combinedScore = 0;
        if (scores.length) {
            var wSum = 0, wTotal = 0;
            for (var i = 0; i < scores.length; i++) { wSum += scores[i] * weights[i]; wTotal += weights[i]; }
            combinedScore = Math.round(wSum / wTotal);
        }

        var isProxy = !!(
            (ipqs  && (ipqs.proxy   || ipqs.vpn))   ||
            (scam  && (scam.vpn     || scam.tor || scam.dchost)) ||
            (pc    && pc.proxy !== 'no')             ||
            (iphub && iphub.block === 1)             ||
            (ipapi && (ipapi.proxy  || ipapi.hosting))
        );

        var result = {
            combinedScore: combinedScore,
            isProxy:       isProxy,
            level: combinedScore >= 85 ? 'fraud' : combinedScore >= 60 ? 'risky' : combinedScore >= 30 ? 'suspect' : 'clean',
            checkedAt: Date.now()
        };
        if (ipqs)  result.ipqs    = ipqs;
        if (abuse) result.abuse   = abuse;
        if (scam)  result.scam    = scam;
        if (pc)    result.pc      = pc;
        if (iphub) result.iphub   = iphub;
        if (ipapi) result.ipapi   = ipapi;
        return result;
    });
}

/* ── URL Builders ── */
function genClickId() { return 'c' + Date.now().toString(36) + Math.random().toString(36).substr(2,8); }

function buildRedirectUrl(template, clickId, affId, subs) {
    var url = template;
    url = url.replace(/\{click_id\}/g, encodeURIComponent(clickId));
    url = url.replace(/\{aff_id\}/g,   encodeURIComponent(affId));
    url = url.replace(/\{sub1\}/g,   encodeURIComponent(subs.sub1||''));
    url = url.replace(/\{sub2\}/g,   encodeURIComponent(subs.sub2||''));
    url = url.replace(/\{sub3\}/g,   encodeURIComponent(subs.sub3||''));
    url = url.replace(/\{sub4\}/g,   encodeURIComponent(subs.sub4||''));
    url = url.replace(/\{sub5\}/g,   encodeURIComponent(subs.sub5||''));
    url = url.replace(/\{fbclid\}/g, encodeURIComponent(subs.fbclid||''));
    url = url.replace(/\{gclid\}/g,  encodeURIComponent(subs.gclid||''));
    url = url.replace(/\{ttclid\}/g, encodeURIComponent(subs.ttclid||''));
    return url;
}

/* ── PARAMS ── */
var params   = new URLSearchParams(window.location.search);
var offerId  = params.get('offer_id') || '';
var affId    = params.get('aff_id')   || '';

var pathMatch = window.location.pathname.match(/^\/go\/([^\/]+)\/([^\/]+)/);
if (pathMatch) { offerId = offerId || decodeURIComponent(pathMatch[1]); affId = affId || decodeURIComponent(pathMatch[2]); }

var sub1 = params.get('sub1')||'', sub2 = params.get('sub2')||'', sub3 = params.get('sub3')||'';
var sub4 = params.get('sub4')||'', sub5 = params.get('sub5')||'';
var fbclid = params.get('fbclid')||'', gclid = params.get('gclid')||'', ttclid = params.get('ttclid')||'';
/* referrer= URL param (explicit traffic source from the link). Stored on its own
   as `referrerParam`, and also used as a FALLBACK for `referer` when the browser's
   document.referrer is empty (e.g. Facebook/IG in-app browsers strip it). So the
   automatic browser capture keeps working exactly as before, and the param only
   fills in when there's nothing from the browser. */
var referrerParam = params.get('referrer')||'';
var isTest = params.get('test') === '1';

if (!offerId || !affId) { showError('Missing required parameters.'); }
else { processClick(); }

function resolveAffId(id) {
    if (/^\d+$/.test(id)) return fbGet('affiliateIndex/' + id).then(function(uid){ return uid || id; });
    return Promise.resolve(id);
}

function processClick() {
    var ua      = parseUA();
    var client  = getClientData();
    var canvasFp = canvasFingerprint();
    var webglFp  = webglFingerprint();
    var deviceId = getDeviceId();
    var signals  = getBrowserSignals();
    var fingerprint = buildFingerprint(canvasFp, webglFp, ua.userAgent, client.timezone, signals.languages, client.screenRes);
    var originalAffId = affId;

    resolveAffId(affId).then(function(realAffUid) {
        affId = realAffUid;
        return Promise.all([
            fbGet('offers/' + offerId),
            fbGet('users/' + affId),
            getGeoData(),
            fbGet('settings/fraud')   /* IPQS key stored here */
        ]);
    }).then(function(results) {
        var offer       = results[0];
        var user        = results[1];
        var geo         = results[2] || {};
        var fraudSettings = results[3] || {};

        if (!offer)                    { showError('Offer not found.'); return; }
        if (offer.status !== 'active') { showError('Offer is not active.'); return; }
        if (!offer.finalUrl)           { showError('Offer has no destination URL.'); return; }
        if (!user)                     { showError('Affiliate not found.'); return; }
        if (user.role !== 'affiliate') { showError('Invalid affiliate.'); return; }
        if (user.status !== 'active')  { showError('Affiliate account is not active.'); return; }

        /* ── GEO ENFORCEMENT (strict multi-provider consensus) ── */
        var geoCheckPromise;
        if (offer.countryMode === 'specific' && offer.allowedCountries) {
            var allowed = String(offer.allowedCountries).toUpperCase().split(',').map(function(c){ return c.trim(); }).filter(Boolean);
            geoCheckPromise = verifyCountryStrict(geo).then(function(verdict) {
                if (allowed.length && !verdict.country) {
                    logBlockedClick(offerId, affId, geo, 'no_geo_detected', allowed.join(','));
                    showGeoBlock(allowed, 'Unknown');
                    return false;
                }
                if (allowed.length && allowed.indexOf(verdict.country) === -1) {
                    logBlockedClick(offerId, affId, geo, 'geo_not_allowed', allowed.join(','));
                    showGeoBlock(allowed, geo.countryName || verdict.country);
                    return false;
                }
                /* Country is in allowed list — allow even with low confidence */
                geo.country = verdict.country;
                return true;
            });
        } else {
            geoCheckPromise = Promise.resolve(true);
        }

        geoCheckPromise.then(function(passed) {
            if (!passed) return;
            /* ── DUPLICATE IP CHECK ──
               Block same IP from clicking same offer twice — regardless of which affiliate's link. */
            var ipForCheck = geo.ip || '';
            if (!ipForCheck || ipForCheck === 'unknown') { _processClick(); return; }
            var ipKey = ipForCheck.replace(/[.:]/g, '_');
            fbGet('clickDedup/' + offerId + '/' + ipKey).then(function(existing) {
                /* 24-hour TTL: only block if dedup entry is less than 24 hours old */
                var dedupTs = (existing && existing.ts) ? existing.ts : 0;
                var isExpired = !dedupTs || (Date.now() - dedupTs) > 86400000;
                if (existing && !isExpired) {
                    /* Duplicate within 24h — log a blocked click record so admin can see it.
                       Save ALL the same fields a regular click would have, just with blocked:true */
                    var dupId = genClickId();
                    var dupTzMatch = (client.timezone && geo.ipTimezone) ? (client.timezone === geo.ipTimezone ? 'match' : 'mismatch') : 'unknown';
                    var dupData = {
                        /* Core */
                        offerId: offerId, affiliateId: affId, affId: originalAffId,
                        timestamp: Date.now(), converted: false, test: isTest || false,
                        /* Traffic source */
                        referer: document.referrer || referrerParam || '', referrerParam: referrerParam, landingUrl: window.location.href,
                        /* Network */
                        ip: geo.ip || '', country: geo.country || '', countryName: geo.countryName || '',
                        city: geo.city || '', region: geo.region || '',
                        isp: geo.isp || '', org: geo.org || '', asn: geo.asn || '',
                        lat: geo.lat || 0, lon: geo.lon || 0, ipTimezone: geo.ipTimezone || '',
                        /* Browser / Device */
                        userAgent: ua.userAgent, device: ua.device, browser: ua.browser,
                        browserVer: ua.browserVer, isLatestBrowser: ua.isLatestBrowser,
                        os: ua.os, osVer: ua.osVer,
                        /* Client */
                        screenRes: client.screenRes, screenAvail: client.screenAvail,
                        timezone: client.timezone, tzOffset: client.tzOffset, tzMatch: dupTzMatch,
                        language: signals.languages, colorDepth: signals.colorDepth,
                        pixelRatio: signals.pixelRatio, touchPoints: signals.touchPoints,
                        hardwareCores: signals.hardwareConcurrency, deviceMemory: signals.deviceMemory,
                        cookiesEnabled: signals.cookiesEnabled, doNotTrack: signals.doNotTrack,
                        plugins: signals.plugins,
                        /* Fingerprints */
                        deviceId: deviceId, canvasFp: canvasFp, webglRenderer: webglFp, fingerprint: fingerprint,
                        /* Subs */
                        sub1:sub1, sub2:sub2, sub3:sub3, sub4:sub4, sub5:sub5,
                        fbclid:fbclid, gclid:gclid, ttclid:ttclid,
                        /* Block metadata */
                        blocked: true, blockReason: 'duplicate_ip',
                        originalClickId: (existing && existing.clickId) || '',
                        originalAffiliateId: (existing && existing.affiliateId) || ''
                    };
                    fbPut('clicks/' + dupId, dupData);
                    showDuplicateBlock(); return;
                }
                _processClick();
            }).catch(function() { _processClick(); /* on lookup error, allow */ });
        });
        return;

        function _processClick() {
        /* Timezone match: compare browser tz vs IP tz */
        var tzMatch = 'unknown';
        if (client.timezone && geo.ipTimezone) {
            tzMatch = client.timezone === geo.ipTimezone ? 'match' : 'mismatch';
        }

        var clickId = genClickId();
        var subs = { sub1:sub1, sub2:sub2, sub3:sub3, sub4:sub4, sub5:sub5, fbclid:fbclid, gclid:gclid, ttclid:ttclid };

        var clickData = {
            /* Core */
            offerId:        offerId,
            affiliateId:    affId,
            affId:          originalAffId,
            timestamp:      Date.now(),
            converted:      false,
            test:           isTest || false,

            /* Traffic source */
            referer:        document.referrer || referrerParam || '',
            referrerParam:  referrerParam,
            landingUrl:     window.location.href,

            /* Network */
            ip:             geo.ip || '',
            country:        geo.country || '',
            countryName:    geo.countryName || '',
            city:           geo.city || '',
            region:         geo.region || '',
            isp:            geo.isp || '',
            org:            geo.org || '',
            asn:            geo.asn || '',
            lat:            geo.lat || 0,
            lon:            geo.lon || 0,
            ipTimezone:     geo.ipTimezone || '',

            /* Browser / Device */
            userAgent:      ua.userAgent,
            device:         ua.device,
            browser:        ua.browser,
            browserVer:     ua.browserVer,
            isLatestBrowser: ua.isLatestBrowser,
            os:             ua.os,
            osVer:          ua.osVer,

            /* Client */
            screenRes:      client.screenRes,
            screenAvail:    client.screenAvail,
            timezone:       client.timezone,
            tzOffset:       client.tzOffset,
            tzMatch:        tzMatch,
            language:       signals.languages,
            colorDepth:     signals.colorDepth,
            pixelRatio:     signals.pixelRatio,
            touchPoints:    signals.touchPoints,
            hardwareCores:  signals.hardwareConcurrency,
            deviceMemory:   signals.deviceMemory,
            cookiesEnabled: signals.cookiesEnabled,
            doNotTrack:     signals.doNotTrack,
            plugins:        signals.plugins,

            /* Fingerprints */
            deviceId:       deviceId,
            canvasFp:       canvasFp,
            webglRenderer:  webglFp,
            fingerprint:    fingerprint,

            /* Subs */
            sub1:sub1, sub2:sub2, sub3:sub3, sub4:sub4, sub5:sub5,
            fbclid:fbclid, gclid:gclid, ttclid:ttclid
        };

        /* Save click → fire fraud check in background → redirect IMMEDIATELY */
        var redirectUrl = buildRedirectUrl(offer.finalUrl, clickId, affId, subs);

        function fireAndRedirect() {
            /* sendBeacon survives page navigation — PHP closes connection instantly,
               runs fraud checks in background after redirect */
            if (geo.ip && geo.ip !== 'unknown' && navigator.sendBeacon) {
                var fd = new FormData();
                fd.append('clickId', clickId);
                fd.append('ip', geo.ip);
                navigator.sendBeacon('https://plan1.climaofficial.com/api/fraud-trigger.php', fd);
            }
            /* Record dedup index — blocks future same-IP clicks on this offer (any affiliate) */
            if (geo.ip && geo.ip !== 'unknown') {
                var ipKeyDone = geo.ip.replace(/[.:]/g, '_');
                fbPut('clickDedup/' + offerId + '/' + ipKeyDone, { clickId: clickId, affiliateId: affId, ts: Date.now() });
            }
            window.location.replace(redirectUrl);
        }

        fbPut('clicks/' + clickId, clickData).then(fireAndRedirect).catch(fireAndRedirect);
        } /* end _processClick */

    }).catch(function(err) {
        showError('Error: ' + (err && err.message ? err.message : 'Unknown error'));
    });
}

})();
</script>
